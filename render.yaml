services:
  - type: web
    name: hevruta-connect
    env: node
    region: frankfurt
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: DATABASE_URL
        fromDatabase:
          name: hevruta-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://hevruta-connect.onrender.com

databases:
  - name: hevruta-db
    region: frankfurt
    plan: free
    databaseName: hevruta
    user: hevruta_user
